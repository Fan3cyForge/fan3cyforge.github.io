<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fan³cy Forge | Terminal</title>
    <style>
        :root {
            --bg: #0c0f17;
            --neon-blue: #8cd3fe;
            --industrial-orange: #c27e65;
            --glass-bg: rgba(20, 26, 38, 0.65);
            --glass-border: rgba(140, 211, 254, 0.35);
            --soft-text: #9db9d4;
        }

        body {
            background:
                radial-gradient(circle at 18% 20%, rgba(140, 211, 254, 0.15), transparent 35%),
                radial-gradient(circle at 78% 75%, rgba(194, 126, 101, 0.14), transparent 34%),
                linear-gradient(120deg, #0a0d15 0%, var(--bg) 60%, #0a0d15 100%);
            color: var(--neon-blue);
            font-family: "JetBrains Mono", "Menlo", "Consolas", monospace;
            margin: 0;
            min-height: 100vh;
            padding: 28px;
            box-sizing: border-box;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                rgba(140, 211, 254, 0.05) 0px,
                rgba(140, 211, 254, 0.05) 1px,
                transparent 2px,
                transparent 4px
            );
            mix-blend-mode: screen;
            z-index: 0;
        }

        .forge-shell {
            max-width: 1100px;
            margin: 0 auto;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
            border-radius: 14px;
            padding: 20px;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .command-bar,
        .system-status {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            border: 1px solid rgba(140, 211, 254, 0.25);
            background: rgba(12, 15, 23, 0.68);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 10px;
            font-size: 0.92rem;
        }

        .system-status {
            grid-template-columns: 1fr 1fr;
            margin-top: 14px;
        }

        .bar-item {
            border: 1px solid rgba(140, 211, 254, 0.18);
            border-radius: 8px;
            padding: 8px 10px;
            color: var(--soft-text);
        }

        .bar-item span {
            color: var(--neon-blue);
        }

        .bar-item strong {
            color: var(--industrial-orange);
            font-weight: 700;
        }

        .forge-title {
            margin: 24px 0 6px;
            font-size: clamp(1.3rem, 3vw, 1.8rem);
            letter-spacing: 0.04em;
        }

        .forge-subtitle {
            margin: 0 0 22px;
            color: var(--soft-text);
            font-size: 0.95rem;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(180px, 1fr));
            gap: 14px;
        }

        .menu-link {
            border: 1px solid rgba(140, 211, 254, 0.35);
            border-radius: 10px;
            background: rgba(11, 18, 30, 0.74);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--neon-blue);
            padding: 16px;
            text-decoration: none;
            position: relative;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .menu-link::before {
            content: attr(data-code);
            display: block;
            color: var(--industrial-orange);
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .menu-link:hover {
            transform: translateY(-4px);
            border-color: var(--neon-blue);
            box-shadow: 0 0 18px rgba(140, 211, 254, 0.35);
            text-shadow: 0 0 10px rgba(140, 211, 254, 0.65);
        }

        .menu-link small {
            display: block;
            margin-top: 8px;
            color: var(--soft-text);
            font-size: 0.82rem;
        }

        .aux-link {
            display: inline-block;
            margin-top: 16px;
            color: var(--industrial-orange);
            text-decoration: none;
            border-bottom: 1px dashed rgba(194, 126, 101, 0.6);
            padding-bottom: 2px;
        }

        .aux-link:hover {
            color: #ffd2bf;
            border-color: #ffd2bf;
        }

        .model-preview {
            margin-top: 14px;
            border: 1px solid rgba(140, 211, 254, 0.3);
            border-radius: 10px;
            padding: 10px;
            background: rgba(11, 18, 30, 0.62);
            display: none;
        }

        .mentor {
            width: 122px;
            position: absolute;
            bottom: 6px;
            opacity: 0.34;
            filter: drop-shadow(0 0 10px rgba(0, 191, 255, 0.5));
            transition: opacity 0.24s ease, transform 0.24s ease, filter 0.24s ease;
            animation: float 3.6s ease-in-out infinite;
            pointer-events: none;
            z-index: 2;
        }

        .mentor.active {
            opacity: 1;
            transform: scale(1.06);
            filter:
                drop-shadow(0 0 10px rgba(0, 191, 255, 0.5))
                drop-shadow(0 0 18px rgba(140, 211, 254, 0.75));
        }

        #kimchi { left: 8px; }
        #mochi { right: 8px; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @media (max-width: 860px) {
            .command-bar,
            .system-status,
            .content-grid {
                grid-template-columns: 1fr;
            }

            .mentor {
                display: block;
                width: 88px;
                opacity: 0.28;
            }
        }
    </style>
</head>
<body>
    <div class="forge-shell">
        <header class="command-bar">
            <div class="bar-item">SYS.TIME: <span id="sys-time">--:--:--</span></div>
            <div class="bar-item">MENTOR: <span id="mentor-status">KimChi Active🟢</span></div>
        </header>

        <img src="assets/images/kimchi.png" id="kimchi" class="mentor" alt="KimChi" loading="lazy">
        <img src="assets/images/mochi.png" id="mochi" class="mentor" alt="MoChi" loading="lazy">

        <h1 class="forge-title">FAN³CY FORGE_SYSTEM</h1>
        <p class="forge-subtitle">The Forge // Cyber-Industrial Operations Console</p>

        <section class="content-grid" aria-label="The Forge Entry Points">
            <a href="lectures/index.html" class="menu-link" data-code="[01] LECTURES">
                進入講義庫
                <small>Access tactical learning modules</small>
            </a>
            <a href="assets/" class="menu-link" data-code="[03] ASSETS">
                提取物資資產
                <small>Retrieve files, kits, and artifacts</small>
            </a>
        </section>

        <section id="model-preview" class="model-preview" aria-label="3D model preview"></section>

        <footer class="system-status">
            <div class="bar-item">SYSTEM: <span>F3F v1.3.7</span></div>
            <div class="bar-item">
                MENTOR:
                <select id="mentor-switcher" aria-label="Mentor Switcher" style="margin-left:8px; background:#111827; color:#8cd3fe; border:1px solid rgba(140, 211, 254, 0.35); border-radius:6px; padding:4px 6px; font-family:inherit;">
                    <option value="kimchi">KimChi</option>
                    <option value="mochi">MoChi</option>
                </select>
            </div>
        </footer>
    </div>

    <script>
        async function initForgeUI() {
            const response = await fetch('config.json');
            const runtimeConfig = await response.json();
    
            // 1. 設定標題
            const subtitle = document.querySelector(".subtitle");
            if (subtitle && runtimeConfig.mentorGreetings) {
                const hour = new Date().getHours();
                let greeting = runtimeConfig.mentorGreetings.morning;
                if (hour >= 12 && hour < 18) greeting = runtimeConfig.mentorGreetings.afternoon;
                if (hour >= 18) greeting = runtimeConfig.mentorGreetings.evening;
                subtitle.textContent = `The Forge // ${greeting}`;
            }
    
            // 2. 處理 3D 模型與控制項
            if (runtimeConfig.modelViewer && runtimeConfig.modelViewer.enabled) {
                const modelPreview = document.getElementById("model-preview");
                if (modelPreview) {
                    // 載入 Google Model Viewer 腳本
                    const script = document.createElement("script");
                    script.type = "module";
                    script.src = "https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js";
                    document.head.appendChild(script);
    
                    modelPreview.style.display = "block";
                    modelPreview.innerHTML = '<div style="margin-bottom:8px;color:#8cd3fe;font-size:12px;">3D SCENE INTERFACE</div>';
    
                    // 建立 3D 檢視器
                    const mv = document.createElement("model-viewer");
                    mv.setAttribute("src", runtimeConfig.modelViewer.src);
                    mv.setAttribute("camera-controls", "");
                    mv.setAttribute("auto-rotate", "");
                    mv.style.width = "100%";
                    mv.style.height = "260px";
                    mv.style.background = "#0a0d15";
                    mv.style.borderRadius = "8px";
                    modelPreview.appendChild(mv);
    
                    // 3. 教學核心：動態產生控制 UI (Web API 互動)
                    if (runtimeConfig.modelViewer.parts) {
                        const controlContainer = document.createElement("div");
                        controlContainer.style.marginTop = "15px";
                        controlContainer.style.display = "grid";
                        controlContainer.style.gridTemplateColumns = "1fr 1fr";
                        controlContainer.style.gap = "10px";
    
                        runtimeConfig.modelViewer.parts.forEach(part => {
                            const wrapper = document.createElement("div");
                            wrapper.innerHTML = `
                                <label style="font-size:10px; display:block; margin-bottom:4px;">${part.label}</label>
                                <input type="color" id="color-${part.materialName}" value="#ffffff" style="width:100%; border:none; background:none; cursor:pointer;">
                            `;
                            
                            // 監聽顏色選擇器
                            const picker = wrapper.querySelector('input');
                            picker.addEventListener('input', (event) => {
                                const color = event.target.value;
                                // 呼叫 Web API 改變模型顏色
                                changeModelColor(mv, part.materialName, color);
                            });
    
                            controlContainer.appendChild(wrapper);
                        });
                        modelPreview.appendChild(controlContainer);
                    }
                }
            }
        }
    
        // 改變模型材質顏色的核心函式
        function changeModelColor(mvElement, materialName, hexColor) {
            // 確保模型已載入
            const material = mvElement.model.materials.find(m => m.name === materialName);
            if (material) {
                // 將 HEX 顏色轉換為 model-viewer 要求的 RGBA 陣列
                const rgb = hexToRgb(hexColor);
                material.pbrMetallicRoughness.setBaseColorFactor([rgb.r/255, rgb.g/255, rgb.b/255, 1]);
                console.log(`API 呼叫：已將 ${materialName} 更新為 ${hexColor}`);
            } else {
                console.warn(`找不到材質名稱：${materialName}，請檢查模型中的 Scene Graph 名稱。`);
            }
        }
    
        // 輔助工具：Hex 轉 RGB
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }
    
        initForgeUI();
    </script>
</body>
</html>
