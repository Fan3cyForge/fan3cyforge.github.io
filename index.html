<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fan³cy Forge | Terminal</title>
    <style>
        /* 強制背景顏色 */
        body { 
            background-color: #0c0f17 !important; 
            color: #8cd3fe; 
            font-family: 'Courier New', monospace; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .terminal-box {
            border: 2px solid #4689cc;
            padding: 40px;
            background: rgba(20, 26, 38, 0.8);
            box-shadow: 0 0 20px rgba(70, 137, 204, 0.5);
            text-align: center;
            position: relative;
            z-index: 2;
        }

        /* 導師圖片樣式 */
        .mentor {
            width: 120px; 
            position: absolute;
            bottom: -60px;
            animation: float 3s ease-in-out infinite;
        }
        #kimchi { left: -50px; }
        #mochi { right: -50px; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .menu-link {
            display: block;
            margin: 15px 0;
            color: #c27e65;
            text-decoration: none;
            font-size: 1.2rem;
        }
        .menu-link:hover { color: #fff; text-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>
    <div class="terminal-box">
        <img src="assets/images/kimchi.png" id="kimchi" class="mentor" alt="KimChi">
        <img src="assets/images/mochi.png" id="mochi" class="mentor" alt="MoChi">
        
        <h1>FAN³CY FORGE_SYSTEM</h1>
        <hr border="1" color="#4689cc">
        <a href="lectures/" class="menu-link">[01] 進入講義庫</a>
        <a href="assignments/" class="menu-link">[02] 提交鍛造任務</a>
        <a href="assets/" class="menu-link">[03] 提取物資資產</a>
    </div>
</body>
</html>
