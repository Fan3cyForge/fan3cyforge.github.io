<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0c0f17; color: #8cd3fe; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .terminal { border: 1px solid #4689cc; padding: 20px; width: 600px; }
        .menu-item { display: block; padding: 10px; border-bottom: 1px solid #c27e65; text-decoration: none; color: #8cd3fe; }
        .menu-item:hover { background: #1a2233; }
        /* 浮動呼吸動畫 */
        @keyframes breathing-float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* 導師圖片基礎樣式 */
        .mentor-avatar {
            width: 150px; /* 根據需求調整大小 */
            animation: breathing-float 4s ease-in-out infinite;
            transition: transform 0.3s ease, filter 0.3s ease;
            cursor: pointer;
            filter: drop-shadow(0 0 10px rgba(140, 211, 254, 0.3)); /* 科技感光暈 */
        }

        /* 滑鼠移入效果 (Hover) */
        .mentor-avatar:hover {
            transform: scale(1.1) translateY(-5px); /* 放大並稍微升起 */
            filter: drop-shadow(0 0 20px rgba(140, 211, 254, 0.8)); /* 增加光暈強度 */
        }
    </style>
    
</head>
<body>
    <div class="terminal">
        <h1>FAN³CY FORGE_SYSTEM</h1>
        <a href="/lectures" class="menu-item">[01] ACCESS LECTURES</a>
        <a href="/assignments" class="menu-item">[02] ACCESS ASSIGNMENTS</a>
        <a href="/assets" class="menu-item">[03] ACCESS ASSETS</a>
    </div>

    <div class="menu-module">
        <img src="assets/images/kimchi_standing.png" class="mentor-avatar" alt="KimChi">
        <a href="/lectures" class="menu-item">[01] ACCESS LECTURES</a>
    </div>
    
    <div class="menu-module">
        <img src="assets/images/mochi_standing.png" class="mentor-avatar" alt="MoChi">
        <a href="/assets" class="menu-item">[03] ACCESS ASSETS</a>
    </div>
</body>
</html>
