<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>講義庫選單</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0c0f17;
            color: #8cd3fe;
            font-family: "Courier New", monospace;
            padding: 20px;
            box-sizing: border-box;
        }

        .menu-box {
            width: min(92vw, 640px);
            border: 2px solid #4689cc;
            padding: 28px;
            background: rgba(20, 26, 38, 0.85);
            box-shadow: 0 0 20px rgba(70, 137, 204, 0.5);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        p {
            color: #b7dcff;
            margin-top: 0;
        }

        .menu-link {
            display: block;
            margin: 12px 0;
            color: #c27e65;
            text-decoration: none;
            font-size: 1.1rem;
        }

        .menu-link:hover {
            color: #fff;
            text-shadow: 0 0 10px #fff;
        }

        .status {
            color: #9db9d4;
            margin: 14px 0;
        }
    </style>
</head>
<body>
    <main class="menu-box">
        <h1>講義庫 / 請選擇檔案</h1>
        <p>此頁會自動讀取講義清單（lectures01.html、lectures02.html...）。</p>
        <hr border="1" color="#4689cc">
        <div id="lecture-list">
            <div class="status">正在載入講義清單...</div>
        </div>
        <a href="../index.html" class="menu-link">[BACK] 返回主選單</a>
    </main>

    <script>
        const OWNER = "fan3cyforge";
        const REPO = "fan3cyforge.github.io";
        const FOLDER = "lectures";
        const apiUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FOLDER}`;
        const listContainer = document.getElementById("lecture-list");

        function buildLink(fileName, index) {
            const anchor = document.createElement("a");
            anchor.className = "menu-link";
            anchor.href = fileName;
            anchor.textContent = `[${String(index + 1).padStart(2, "0")}] ${fileName}`;
            return anchor;
        }

        async function loadLectures() {
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const items = await response.json();
                const lectureFiles = items
                    .filter((item) => item.type === "file")
                    .map((item) => item.name)
                    .filter((name) => /^lectures\d+\.html$/i.test(name))
                    .sort((a, b) => {
                        const aNum = Number((a.match(/\d+/) || ["0"])[0]);
                        const bNum = Number((b.match(/\d+/) || ["0"])[0]);
                        return aNum - bNum;
                    });

                listContainer.innerHTML = "";

                if (lectureFiles.length === 0) {
                    listContainer.innerHTML = '<div class="status">目前沒有可用的講義檔案。</div>';
                    return;
                }

                lectureFiles.forEach((fileName, index) => {
                    listContainer.appendChild(buildLink(fileName, index));
                });
            } catch (error) {
                listContainer.innerHTML =
                    '<div class="status">無法載入遠端清單，請確認 GitHub 倉庫名稱與網路狀態。</div>';
            }
        }

        loadLectures();
    </script>
</body>
</html>
