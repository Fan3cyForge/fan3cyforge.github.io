<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fan³cy Forge - 文件閱讀器</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0c0f17;
            --text-color: #e0e6ed;
            --accent: #4689cc;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px 20px 80px 20px; /* 底部預留空間給按鈕 */
        }
        #content {
            max-width: 800px;
            margin: 0 auto;
            background-color: #151a27;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
        #content h1, h2, h3 { color: var(--accent); }
        #content code {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }
        /* 右下角懸浮按鈕 */
        .back-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(194, 126, 101, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(194, 126, 101, 0.5);
            color: #c27e65;
            padding: 12px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .back-btn:hover {
            background: rgba(194, 126, 101, 0.4);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div id="content">載入中，請稍候...</div>

    <a href="index.html" class="back-btn">⏴ 返回 Fan³cy Forge</a>

    <script>
        // 從 URL 獲取檔案路徑，例如：viewer.html?file=lectures/week1.md
        const urlParams = new URLSearchParams(window.location.search);
        const filePath = urlParams.get('file');

        if (filePath) {
            fetch(filePath)
                .then(response => {
                    if (!response.ok) throw new Error('檔案不存在');
                    return response.text();
                })
                .then(text => {
                    document.getElementById('content').innerHTML = marked.parse(text);
                })
                .catch(error => {
                    document.getElementById('content').innerHTML = '<h2>錯誤</h2><p>無法載入指定的檔案，請確認連結是否正確。</p>';
                });
        } else {
            document.getElementById('content').innerHTML = '<h2>未指定檔案</h2><p>請透過正確的連結進入此頁面。</p>';
        }
    </script>
</body>
</html>
